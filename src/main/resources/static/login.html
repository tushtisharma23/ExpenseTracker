<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#0f0f14;
            color:white;
        }

        .login-box{
            width:380px;
            background:rgba(255,255,255,0.05);
            padding:40px;
            border-radius:28px;
            border:1px solid rgba(255,255,255,0.08);
        }

        .login-box h1{
            text-align:center;
            margin-bottom:35px;
            color:#ff8f66;
            font-size:42px;
        }

        .login-box input{
            width:100%;
            padding:16px;
            margin-bottom:20px;
            border:none;
            outline:none;
            border-radius:14px;
            background:#1c1c24;
            color:white;
            font-size:16px;
        }

        .login-box button{
            width:100%;
            padding:16px;
            border:none;
            border-radius:14px;
            background:linear-gradient(to right,#ff9b70,#ff6b4a);
            color:white;
            font-size:17px;
            font-weight:bold;
            cursor:pointer;
        }

        .error{
            margin-top:18px;
            text-align:center;
            color:#ff6b6b;
            display:none;
        }

    </style>
</head>

<body>

<div class="login-box">

    <h1>Login</h1>

    <input type="text"
           id="username"
           placeholder="Enter Username">

    <input type="password"
           id="password"
           placeholder="Enter Password">

    <button onclick="login()">
        Login
    </button>

    <p class="error" id="errorMsg"></p>

</div>


<script>

    function login(){

        const username =
            document.getElementById("username").value;

        const password =
            document.getElementById("password").value;

        if(username === "" || password === ""){

            document.getElementById("errorMsg")
                .innerText = "Please fill all fields";

            document.getElementById("errorMsg")
                .style.display = "block";

            return;
        }

        localStorage.setItem(
            "loggedInUser",
            username
        );

        window.location.href = "index.html";

    }

</script>

</body>
</html>
